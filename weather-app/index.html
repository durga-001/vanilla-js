<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
    <script src="app.js" defer></script>
  </head>
  <body>
    <div class="box">
      <div class="search">
        <input type="text" placeholder="Enter city name" class="search-input" />
        <button class="btn"><img src="images/search.png" alt="" /></button>
      </div>

      <div class="error">This city doesn't exist !!</div>

      <div class="weather">
        <img src="images/clear.png" class="weather-icon" alt="" />
        <h1 class="temp">22&deg;C</h1>
        <h1 class="city">Delhi</h1>

        <div class="details">
          <div class="col">
            <img src="images/humidity.png" alt="" />
            <div class="humidity">
              <p>Humidity:</p>
              20%
            </div>
          </div>
          <div class="col">
            <img src="images/wind.png" alt="" />
            <div class="wind">
              <p>Wind:</p>
              20 km/h
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
